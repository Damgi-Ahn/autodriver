# cameras.yaml
# Multi-camera configuration for autodriver perception system
# Supports up to 12 cameras on NVIDIA Jetson Orin

cameras:
  - id: 0
    name: front
    device: /dev/video0
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: HIGH
    calibration:
      enabled: true
      file: config/calibration/front_camera.yaml

  - id: 1
    name: front_left
    device: /dev/video1
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: HIGH
    calibration:
      enabled: true
      file: config/calibration/front_left_camera.yaml

  - id: 2
    name: front_right
    device: /dev/video2
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: HIGH
    calibration:
      enabled: true
      file: config/calibration/front_right_camera.yaml

  - id: 3
    name: rear
    device: /dev/video3
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: HIGH
    calibration:
      enabled: true
      file: config/calibration/rear_camera.yaml

  - id: 4
    name: rear_left
    device: /dev/video4
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: NORMAL
    calibration:
      enabled: false

  - id: 5
    name: rear_right
    device: /dev/video5
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: NORMAL
    calibration:
      enabled: false

  - id: 6
    name: left
    device: /dev/video6
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: NORMAL
    calibration:
      enabled: false

  - id: 7
    name: right
    device: /dev/video7
    fps: 30
    resolution: [1920, 1080]
    pixel_format: UYVY
    priority: NORMAL
    calibration:
      enabled: false

# Frame drop policy
# High priority cameras always run at full fps.
# Normal priority cameras are rate-limited to conserve IPC bandwidth.
frame_drop_policy:
  high_priority_cameras: [0, 1, 2, 3]
  normal_priority_min_fps: 10
  normal_priority_max_fps: 20
